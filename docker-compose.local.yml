services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nekotribe:local
    restart: unless-stopped
    ports:
      - '${APP_PORT:-30001}:3000'
    env_file:
      - ${ENV_FILE:-./.env}
    volumes:
      - ${STORAGE_ROOT_DIR:-./storage}:${DOCKER_STORAGE_PATH:-/app/storage}
    environment:
      NODE_ENV: ${DOCKER_NODE_ENV:-production}
      NUXT_NODE_ENV: ${DOCKER_NODE_ENV:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      NUXT_COOKIE_SECURE: ${COOKIE_SECURE:-true}
      NUXT_ACCESS_SECRET: ${ACCESS_SECRET}
      NUXT_ACCESS_EXPIRES_IN: ${ACCESS_EXPIRES_IN}
      NUXT_REFRESH_SECRET: ${REFRESH_SECRET}
      NUXT_REFRESH_EXPIRES_IN: ${REFRESH_EXPIRES_IN}
      ORACLE_HOST: ${DOCKER_ORACLE_HOST:-oracle19c}
      ORACLE_PORT: ${DOCKER_ORACLE_PORT:-1521}
      NUXT_ORACLE_HOST: ${DOCKER_ORACLE_HOST:-oracle19c}
      NUXT_ORACLE_PORT: ${DOCKER_ORACLE_PORT:-1521}
      NUXT_ORACLE_SID: ${ORACLE_SID}
      NUXT_ORACLE_SERVICE_NAME: ${ORACLE_SERVICE_NAME}
      NUXT_ORACLE_USER: ${ORACLE_USER}
      NUXT_ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      NUXT_ORACLE_POOL_MIN: ${ORACLE_POOL_MIN}
      NUXT_ORACLE_POOL_MAX: ${ORACLE_POOL_MAX}
      NUXT_ORACLE_POOL_INCREMENT: ${ORACLE_POOL_INCREMENT}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      NUXT_REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      NUXT_REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      NUXT_REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      NUXT_REDIS_DB: ${REDIS_DB:-0}
      NUXT_REDIS_PASSWORD: ${REDIS_PASSWORD}
      NUXT_SMTP_HOST: ${SMTP_HOST}
      NUXT_SMTP_PORT: ${SMTP_PORT}
      NUXT_SMTP_USER: ${SMTP_USER}
      NUXT_SMTP_PASS: ${SMTP_PASS}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_PATH: ${DOCKER_STORAGE_PATH:-/app/storage}
      STORAGE_PUBLIC_BASE: ${STORAGE_PUBLIC_BASE:-/storage}
      STORAGE_CDN_BASE_URL: ${STORAGE_CDN_BASE_URL:-}
      BASE_URL: ${BASE_URL:-}
      NUXT_PUBLIC_WS_URL: ${DOCKER_PUBLIC_WS_URL:-ws://localhost:30001/_ws}
      SENTIMENTFLOW_ENABLED: ${SENTIMENTFLOW_ENABLED:-false}
      SENTIMENTFLOW_BASE_URL: http://sentimentflow:${SENTIMENTFLOW_CONTAINER_PORT:-8846}/api
      SENTIMENTFLOW_TIMEOUT_MS: ${SENTIMENTFLOW_TIMEOUT_MS:-10000}
      NUXT_SENTIMENT_FLOW_ENABLED: ${SENTIMENTFLOW_ENABLED:-false}
      NUXT_SENTIMENT_FLOW_BASE_URL: http://sentimentflow:${SENTIMENTFLOW_CONTAINER_PORT:-8846}/api
      NUXT_SENTIMENT_FLOW_TIMEOUT_MS: ${SENTIMENTFLOW_TIMEOUT_MS:-10000}
      NUXT_PUBLIC_SENTIMENT_FLOW_ENABLED: ${SENTIMENTFLOW_ENABLED:-false}
    networks:
      - neko-network
    depends_on:
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/api/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 15s
      timeout: 5s
      retries: 32
      start_period: 120s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-./.env}
    command:
      [
        'sh',
        '-c',
        'if [ -n "$${REDIS_PASSWORD}" ]; then redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"; else redis-server --appendonly yes; fi'
      ]
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    networks:
      - neko-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'if [ -n "$${REDIS_PASSWORD}" ]; then redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG; else redis-cli ping | grep PONG; fi'
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: nekotribe-nginx-dev
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-30002}:80'
    volumes:
      - ./nginx/nginx.main.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/nginx.compose.conf:/etc/nginx/conf.d/default.conf:ro
      - ${STORAGE_ROOT_DIR:-./storage}:/usr/share/nginx/storage:ro
    networks:
      - neko-network
    depends_on:
      app:
        condition: service_healthy

  sentimentflow:
    profiles:
      - '${SENTIMENTFLOW_ENABLED:-false}'
    image: ${SENTIMENTFLOW_LOCAL_IMAGE:-sentimentflow-backend:local}
    build:
      context: .
      pull: true
      args:
        SENTIMENTFLOW_GIT_REPO: ${SENTIMENTFLOW_GIT_REPO:-https://github.com/Cthaat/SentimentFlow.git}
        SENTIMENTFLOW_GIT_REF: ${SENTIMENTFLOW_GIT_REF:-main}
        SENTIMENTFLOW_PIP_INDEX_URL: ${SENTIMENTFLOW_PIP_INDEX_URL:-https://pypi.org/simple}
        SENTIMENTFLOW_TORCH_INDEX_URL: ${SENTIMENTFLOW_TORCH_INDEX_URL:-https://pypi.org/simple}
        SENTIMENTFLOW_TORCH_PACKAGE: ${SENTIMENTFLOW_TORCH_PACKAGE:-torch}
        SENTIMENTFLOW_CONTAINER_PORT: ${SENTIMENTFLOW_CONTAINER_PORT:-8846}
      dockerfile_inline: |
        FROM python:3.11-slim AS source
        ARG SENTIMENTFLOW_GIT_REPO
        ARG SENTIMENTFLOW_GIT_REF
        WORKDIR /workspace
        RUN apt-get update \
          && apt-get install -y --no-install-recommends ca-certificates git \
          && rm -rf /var/lib/apt/lists/*
        RUN set -eux; \
          git init .; \
          git remote add origin "$${SENTIMENTFLOW_GIT_REPO}"; \
          git fetch --depth 1 origin "$${SENTIMENTFLOW_GIT_REF}"; \
          git checkout --detach FETCH_HEAD; \
          rm -rf .git

        FROM python:3.11-slim AS deps
        ARG SENTIMENTFLOW_PIP_INDEX_URL=https://pypi.org/simple
        ARG SENTIMENTFLOW_TORCH_INDEX_URL=https://pypi.org/simple
        ARG SENTIMENTFLOW_TORCH_PACKAGE=torch
        ENV PIP_DISABLE_PIP_VERSION_CHECK=1
        WORKDIR /deps
        COPY --from=source /workspace/backend/requirements.txt ./requirements.txt
        RUN --mount=type=cache,target=/root/.cache/pip \
          grep -vE '^[[:space:]]*torch([[:space:]=<>!~].*)?$' requirements.txt > requirements-runtime.txt \
          && python -m pip install --upgrade pip \
          && python -m pip install --prefer-binary --retries 10 --timeout 120 --index-url "$${SENTIMENTFLOW_TORCH_INDEX_URL}" "$${SENTIMENTFLOW_TORCH_PACKAGE}" \
          && python -m pip install --prefer-binary --retries 10 --timeout 120 --index-url "$${SENTIMENTFLOW_PIP_INDEX_URL}" -r requirements-runtime.txt

        FROM python:3.11-slim
        ARG SENTIMENTFLOW_CONTAINER_PORT=8846
        ENV PYTHONUNBUFFERED=1 \
            SENTIMENTFLOW_PROJECT_ROOT=/workspace \
            PYTHONPATH=/workspace:/workspace/backend \
            SENTIMENTFLOW_CONTAINER_PORT=${SENTIMENTFLOW_CONTAINER_PORT}
        WORKDIR /workspace
        COPY --from=deps /usr/local /usr/local
        COPY --from=source /workspace /workspace
        WORKDIR /workspace/backend
        EXPOSE ${SENTIMENTFLOW_CONTAINER_PORT}
        CMD ["sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port ${SENTIMENTFLOW_CONTAINER_PORT:-8846}"]
    pull_policy: build
    working_dir: /workspace/backend
    restart: unless-stopped
    environment:
      SENTIMENTFLOW_PROJECT_ROOT: /workspace
      PYTHONPATH: /workspace:/workspace/backend
      SENTIMENTFLOW_CONTAINER_PORT: ${SENTIMENTFLOW_CONTAINER_PORT:-8846}
      NVIDIA_VISIBLE_DEVICES: ${SENTIMENTFLOW_GPUS:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${SENTIMENTFLOW_NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    command: uvicorn app.main:app --host 0.0.0.0 --port ${SENTIMENTFLOW_CONTAINER_PORT:-8846}
    gpus: all
    ports:
      - '${SENTIMENTFLOW_HOST_PORT:-8846}:${SENTIMENTFLOW_CONTAINER_PORT:-8846}'
    volumes:
      - ./sentimentflow-models:/workspace/models
    networks:
      - neko-network
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          'import urllib.request; urllib.request.urlopen("http://127.0.0.1:${SENTIMENTFLOW_CONTAINER_PORT:-8846}/health", timeout=3).read()'
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sentimentflow-frontend:
    profiles:
      - '${SENTIMENTFLOW_ENABLED:-false}'
    image: ${SENTIMENTFLOW_FRONTEND_LOCAL_IMAGE:-sentimentflow-frontend:local}
    build:
      context: .
      pull: true
      args:
        SENTIMENTFLOW_GIT_REPO: ${SENTIMENTFLOW_GIT_REPO:-https://github.com/Cthaat/SentimentFlow.git}
        SENTIMENTFLOW_GIT_REF: ${SENTIMENTFLOW_GIT_REF:-main}
        SENTIMENTFLOW_FRONTEND_CONTAINER_PORT: ${SENTIMENTFLOW_FRONTEND_CONTAINER_PORT:-3000}
        YARN_REGISTRY: ${YARN_REGISTRY:-https://registry.npmjs.org}
      dockerfile_inline: |
        FROM node:20-bookworm-slim AS source
        ARG SENTIMENTFLOW_GIT_REPO
        ARG SENTIMENTFLOW_GIT_REF
        WORKDIR /workspace
        RUN apt-get update \
          && apt-get install -y --no-install-recommends ca-certificates git \
          && rm -rf /var/lib/apt/lists/*
        RUN set -eux; \
          git init .; \
          git remote add origin "$${SENTIMENTFLOW_GIT_REPO}"; \
          git fetch --depth 1 origin "$${SENTIMENTFLOW_GIT_REF}"; \
          git checkout --detach FETCH_HEAD; \
          rm -rf .git

        FROM node:20-bookworm-slim AS deps
        ARG YARN_REGISTRY=https://registry.npmjs.org
        WORKDIR /app
        COPY --from=source /workspace/frontend/package.json /workspace/frontend/yarn.lock ./
        RUN yarn config set registry "$${YARN_REGISTRY}" \
          && yarn install --frozen-lockfile

        FROM node:20-bookworm-slim AS builder
        WORKDIR /app
        ENV NEXT_TELEMETRY_DISABLED=1
        COPY --from=deps /app/node_modules ./node_modules
        COPY --from=source /workspace/frontend ./
        RUN yarn build

        FROM node:20-bookworm-slim AS runner
        ARG SENTIMENTFLOW_FRONTEND_CONTAINER_PORT=3000
        WORKDIR /app
        ENV NODE_ENV=production \
            NEXT_TELEMETRY_DISABLED=1 \
            HOSTNAME=0.0.0.0 \
            PORT=${SENTIMENTFLOW_FRONTEND_CONTAINER_PORT}
        RUN groupadd --system --gid 1001 nodejs \
          && useradd --system --uid 1001 --gid nodejs nextjs
        COPY --from=builder /app/public ./public
        COPY --from=builder --chown=nextjs:nodejs /app/.next/standalone ./
        COPY --from=builder --chown=nextjs:nodejs /app/.next/static ./.next/static
        USER nextjs
        EXPOSE ${SENTIMENTFLOW_FRONTEND_CONTAINER_PORT}
        CMD ["node", "server.js"]
    pull_policy: build
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      HOSTNAME: 0.0.0.0
      PORT: ${SENTIMENTFLOW_FRONTEND_CONTAINER_PORT:-3000}
      BACKEND_API_URL: http://sentimentflow:${SENTIMENTFLOW_CONTAINER_PORT:-8846}
      BACKEND_API_TIMEOUT_MS: ${SENTIMENTFLOW_TIMEOUT_MS:-10000}
    ports:
      - '${SENTIMENTFLOW_FRONTEND_HOST_PORT:-30008}:${SENTIMENTFLOW_FRONTEND_CONTAINER_PORT:-3000}'
    networks:
      - neko-network
    depends_on:
      sentimentflow:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'const port=process.env.PORT||"3000";fetch("http://127.0.0.1:"+port+"/api/integration/health").then(r=>r.json()).then(j=>process.exit(j.ok?0:1)).catch(()=>process.exit(1))'
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  db-init:
    image: '${ORACLE_IMAGE:-container-registry.oracle.com/database/enterprise:19.3.0.0}'
    restart: 'no'
    environment:
      ORACLE_HOST: ${DOCKER_ORACLE_HOST:-oracle19c}
      ORACLE_PORT: ${DOCKER_ORACLE_PORT:-1521}
      ORACLE_PWD: ${ORACLE_PWD:-NekoRoot2026Local}
      ORACLE_SYS_SERVICE_NAME: ${ORACLE_SYS_SERVICE_NAME:-ORCLCDB}
      ORACLE_PDB_NAME: ${ORACLE_SERVICE_NAME:-ORCLPDB1}
      DB_INIT_SCHEMA: ${ORACLE_USER:-neko_app}
      DB_INIT_CHECK_TABLE: ${DB_INIT_CHECK_TABLE:-N_USERS}
      SQL_FILE: /opt/oracle/init/neko_tribe-oracle-v2.sql
    volumes:
      - ./doc/neko_tribe-oracle-v2.sql:/opt/oracle/init/neko_tribe-oracle-v2.sql:ro
      - ./scripts/docker-init-db.sh:/opt/oracle/init/docker-init-db.sh:ro
    entrypoint:
      - /bin/bash
      - /opt/oracle/init/docker-init-db.sh
    networks:
      - neko-network
    depends_on:
      oracle19c:
        condition: service_healthy

  oracle19c:
    image: '${ORACLE_IMAGE:-container-registry.oracle.com/database/enterprise:19.3.0.0}'
    container_name: oracle19c
    ports:
      - '${ORACLE_HOST_PORT:-5501}:1521'
      - '${ORACLE_EM_PORT:-5500}:5500'
    environment:
      ORACLE_PWD: ${ORACLE_PWD:-NekoRoot2026Local}
      ORACLE_PDB: ${ORACLE_SERVICE_NAME:-ORCLPDB1}
    volumes:
      - ./data/oracle-data:/opt/oracle/oradata
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'printf "%s\n" "SELECT ''NEKOTRIBE_PDB_READY'' FROM dual;" | sqlplus -L -s "sys/$${ORACLE_PWD}@//localhost:1521/${ORACLE_SERVICE_NAME:-ORCLPDB1} as sysdba" | grep -q NEKOTRIBE_PDB_READY'
        ]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped
    networks:
      - neko-network

networks:
  neko-network:
    driver: bridge

volumes:
  redis-data:
  sentimentflow-models:

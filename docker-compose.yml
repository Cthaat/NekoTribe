services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nekotribe:local
    restart: unless-stopped
    ports:
      - '${APP_PORT:-30001}:3000'
    env_file:
      - ${ENV_FILE:-./.env}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      ORACLE_HOST: ${DOCKER_ORACLE_HOST:-oracle19c}
      ORACLE_PORT: ${DOCKER_ORACLE_PORT:-1521}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      NUXT_PUBLIC_WS_URL: ${DOCKER_PUBLIC_WS_URL:-ws://localhost:30001/_ws}
    networks:
      - neko-network
    depends_on:
      redis:
        condition: service_healthy
      oracle19c:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-./.env}
    command:
      [
        'sh',
        '-c',
        'if [ -n "$${REDIS_PASSWORD}" ]; then redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"; else redis-server --appendonly yes; fi'
      ]
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    networks:
      - neko-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'if [ -n "$${REDIS_PASSWORD}" ]; then redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG; else redis-cli ping | grep PONG; fi'
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: nekotribe-nginx-dev
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-30002}:80'
    volumes:
      - ./nginx/nginx.compose.conf:/etc/nginx/conf.d/default.conf:ro
      - ./upload:/usr/share/nginx/upload:ro
    networks:
      - neko-network
    depends_on:
      app:
        condition: service_healthy

  oracle19c:
    image: container-registry.oracle.com/database/enterprise:19.3.0.0
    container_name: oracle19c
    ports:
      - '${ORACLE_HOST_PORT:-5501}:1521'
      - '${ORACLE_EM_PORT:-5500}:5500'
    environment:
      ORACLE_PWD: ${ORACLE_PWD:-NekoRoot2026Local}
    volumes:
      - ./data/oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ['CMD-SHELL', 'lsnrctl status >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped
    networks:
      - neko-network

networks:
  neko-network:
    driver: bridge

volumes:
  redis-data:

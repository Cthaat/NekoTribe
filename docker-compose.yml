services:
  app:
    image: ghcr.io/cthaat/nekotribe:master
    restart: unless-stopped
    pull_policy: always
    ports:
      - '${APP_PORT:-30001}:3000'
    env_file:
      - ${ENV_FILE:-./.env}
    volumes:
      - ${STORAGE_ROOT_DIR:-./storage}:${DOCKER_STORAGE_PATH:-/app/storage}
    environment:
      NODE_ENV: ${DOCKER_NODE_ENV:-production}
      NUXT_NODE_ENV: ${DOCKER_NODE_ENV:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      NUXT_COOKIE_SECURE: ${COOKIE_SECURE:-true}
      NUXT_ACCESS_SECRET: ${ACCESS_SECRET}
      NUXT_ACCESS_EXPIRES_IN: ${ACCESS_EXPIRES_IN}
      NUXT_REFRESH_SECRET: ${REFRESH_SECRET}
      NUXT_REFRESH_EXPIRES_IN: ${REFRESH_EXPIRES_IN}
      ORACLE_HOST: ${DOCKER_ORACLE_HOST:-oracle19c}
      ORACLE_PORT: ${DOCKER_ORACLE_PORT:-1521}
      NUXT_ORACLE_HOST: ${DOCKER_ORACLE_HOST:-oracle19c}
      NUXT_ORACLE_PORT: ${DOCKER_ORACLE_PORT:-1521}
      NUXT_ORACLE_SID: ${ORACLE_SID}
      NUXT_ORACLE_SERVICE_NAME: ${ORACLE_SERVICE_NAME}
      NUXT_ORACLE_USER: ${ORACLE_USER}
      NUXT_ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      NUXT_ORACLE_POOL_MIN: ${ORACLE_POOL_MIN}
      NUXT_ORACLE_POOL_MAX: ${ORACLE_POOL_MAX}
      NUXT_ORACLE_POOL_INCREMENT: ${ORACLE_POOL_INCREMENT}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      NUXT_REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      NUXT_REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      NUXT_REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      NUXT_REDIS_DB: ${REDIS_DB:-0}
      NUXT_REDIS_PASSWORD: ${REDIS_PASSWORD}
      NUXT_SMTP_HOST: ${SMTP_HOST}
      NUXT_SMTP_PORT: ${SMTP_PORT}
      NUXT_SMTP_USER: ${SMTP_USER}
      NUXT_SMTP_PASS: ${SMTP_PASS}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_PATH: ${DOCKER_STORAGE_PATH:-/app/storage}
      STORAGE_PUBLIC_BASE: ${STORAGE_PUBLIC_BASE:-/storage}
      STORAGE_CDN_BASE_URL: ${STORAGE_CDN_BASE_URL:-}
      BASE_URL: ${BASE_URL:-}
      NUXT_PUBLIC_WS_URL: ${DOCKER_PUBLIC_WS_URL:-ws://localhost:30001/_ws}
      NLS_LANG: ${NLS_LANG}
    networks:
      - neko-network
    depends_on:
      redis:
        condition: service_healthy
      oracle19c:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/api/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 15s
      timeout: 5s
      retries: 32
      start_period: 120s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-./.env}
    command:
      [
        'sh',
        '-c',
        'if [ -n "$${REDIS_PASSWORD}" ]; then redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"; else redis-server --appendonly yes; fi'
      ]
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    networks:
      - neko-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'if [ -n "$${REDIS_PASSWORD}" ]; then redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG; else redis-cli ping | grep PONG; fi'
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: nekotribe-nginx-dev
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-30002}:80'
    volumes:
      - ./nginx/nginx.main.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/nginx.compose.conf:/etc/nginx/conf.d/default.conf:ro
      - ${STORAGE_ROOT_DIR:-./storage}:/usr/share/nginx/storage:ro
    networks:
      - neko-network
    depends_on:
      app:
        condition: service_healthy

  oracle19c:
    image: container-registry.oracle.com/database/enterprise:19.3.0.0
    container_name: oracle19c
    ports:
      - '${ORACLE_HOST_PORT:-5501}:1521'
      - '${ORACLE_EM_PORT:-5500}:5500'
    environment:
      ORACLE_PWD: ${ORACLE_PWD:-NekoRoot2026Local}
    volumes:
      - ./data/oracle-data:/opt/oracle/oradata
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'lsnrctl status >/dev/null 2>&1 || exit 1'
        ]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped
    networks:
      - neko-network

networks:
  neko-network:
    driver: bridge

volumes:
  redis-data:
